<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KREHSST Assistant</title>

<style>
*{box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{margin:0;background:#f7f7f8;color:#111827;height:100vh;display:flex;overflow:hidden}

.sidebar{width:280px;background:#111827;color:white;padding:16px;display:flex;flex-direction:column;gap:14px}
.logo{font-size:20px;font-weight:700}
.side-btn{background:#1f2937;color:white;border:1px solid #374151;padding:12px;border-radius:10px;cursor:pointer;text-align:left}
.side-btn:hover{background:#374151}

.history{flex:1;overflow-y:auto}
.history b{display:block;margin-bottom:8px;color:#d1d5db}
.history-item{padding:10px;border-radius:8px;cursor:pointer;font-size:14px;color:#e5e7eb}
.history-item:hover{background:#374151}

.main{flex:1;display:flex;flex-direction:column;height:100vh}
.header{height:58px;background:white;border-bottom:1px solid #e5e7eb;padding:16px 22px;font-weight:700;display:flex;align-items:center;gap:12px}
.menu-btn{display:none;background:none;color:#111827;border:none;font-size:24px;cursor:pointer}

.chat-area{flex:1;overflow-y:auto;padding:28px}
.welcome{text-align:center;margin-top:50px}
.welcome h1{font-size:32px;margin-bottom:8px}
.welcome p{color:#6b7280}

.suggestions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.suggestion{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:12px 16px;cursor:pointer;max-width:260px;text-align:left}
.suggestion:hover{background:#f3f4f6}

.welcome-input,.input-box{
  max-width:900px;
  margin:auto;
  display:flex;
  gap:8px;
  align-items:center;
  background:#f3f4f6;
  border:1px solid #d1d5db;
  border-radius:18px;
  padding:10px;
}

.welcome-input{margin-top:28px;max-width:720px}

textarea{
  flex:1;
  border:none;
  background:transparent;
  resize:none;
  outline:none;
  font-size:15px;
  min-height:40px;
  max-height:120px;
}

.message{max-width:850px;margin:0 auto 20px;display:flex;gap:12px;line-height:1.6}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-avatar{background:#2563eb;color:white}
.bot-avatar{background:#10a37f;color:white}
.bubble{background:white;padding:14px 18px;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);white-space:pre-wrap;max-width:100%}

.input-area{background:white;border-top:1px solid #e5e7eb;padding:14px}

button{
  background:#10a37f;
  color:white;
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:600;
}
button:hover{background:#0e8f70}
.mic{background:#374151}
.mic:hover{background:#1f2937}

.overlay{display:none}

@media(max-width:768px){
  body{display:block}
  .sidebar{
    position:fixed;
    left:-290px;
    top:0;
    height:100vh;
    z-index:10;
    transition:.3s;
  }
  .sidebar.open{left:0}
  .main{width:100%}
  .menu-btn{display:block}
  .chat-area{padding:18px 12px}
  .message{max-width:100%}
  .welcome{margin-top:30px}
  .welcome h1{font-size:26px}
  .suggestion{width:100%;max-width:100%}
  .welcome-input{width:100%}
  .overlay.show{
    display:block;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    z-index:9;
  }
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">KREHSST Assistant</div>
  <button class="side-btn" onclick="newChat()">+ New Chat</button>
  <div class="history" id="history"></div>
</aside>

<main class="main">
  <div class="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    KREHSST Resource Hub
  </div>

  <div class="chat-area" id="chat">
    <div class="welcome" id="welcome">
      <h1>How can I help you today?</h1>
      <p>Ask anything about KREHSST resources, hiring, HR, or support.</p>

      <div class="suggestions" id="suggestions"></div>

      <div class="welcome-input">
        <textarea id="welcomeQ" placeholder="Or type your own question..."></textarea>
        <button class="mic" onclick="startMic('welcomeQ')">🎤</button>
        <button onclick="askFromWelcome()">Send</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="q" placeholder="Message KREHSST Assistant..." onkeydown="handleKey(event)"></textarea>
      <button class="mic" onclick="startMic('q')">🎤</button>
      <button onclick="ask()">Send</button>
    </div>
  </div>
</main>

<script>
let currentChatId = Date.now().toString();

const sampleQuestions = [
  "What services does KREHSST provide?",
  "How can I contact the HR team?",
  "Show me recruitment support resources",
  "Help me understand the hiring process",
  "What documents are required?",
  "Give me interview preparation tips",
  "How can I submit my resume?",
  "Explain the employee onboarding process",
  "Tell me about career opportunities",
  "How can I get recruitment support?"
];

window.onload = () => {
  showSuggestions();
  loadHistory();
};

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

function showSuggestions(){
  const box = document.getElementById("suggestions");
  if(!box) return;

  box.innerHTML = "";

  sampleQuestions
    .sort(() => 0.5 - Math.random())
    .slice(0,3)
    .forEach(q => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.innerText = q;
      div.onclick = () => {
        document.getElementById("q").value = q;
        ask();
      };
      box.appendChild(div);
    });
}

function askFromWelcome(){
  const value = document.getElementById("welcomeQ").value.trim();
  if(!value) return;

  document.getElementById("q").value = value;
  ask();
}

async function ask(){
  const input = document.getElementById("q");
  const message = input.value.trim();

  if(!message) return;

  const welcome = document.getElementById("welcome");
  if(welcome) welcome.style.display = "none";

  addMessage(message, "user");
  input.value = "";

  const botId = addMessage("Thinking...", "bot");

  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({ message })
    });

    const data = await res.json();
    const answer = data.answer || "Sorry, I could not find an answer.";

    document.getElementById(botId).innerText = answer;
    saveChat(message, answer);

  } catch(error){
    document.getElementById(botId).innerText =
      "Something went wrong. Please try again.";
  }
}

function addMessage(text,type){
  const chat = document.getElementById("chat");
  const id = "msg-" + Date.now() + Math.random();

  const div = document.createElement("div");
  div.className = "message";

  div.innerHTML = `
    <div class="avatar ${type === "user" ? "user-avatar" : "bot-avatar"}">
      ${type === "user" ? "U" : "AI"}
    </div>
    <div class="bubble" id="${id}">${escapeHtml(text)}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return id;
}

function saveChat(question,answer){
  const chats = JSON.parse(localStorage.getItem("krehsstChats") || "[]");

  chats.unshift({
    id: currentChatId,
    title: question.slice(0,40),
    question,
    answer,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("krehsstChats", JSON.stringify(chats.slice(0,25)));
  loadHistory();
}

function loadHistory(){
  const history = document.getElementById("history");
  const chats = JSON.parse(localStorage.getItem("krehsstChats") || "[]");

  history.innerHTML = "<b>Chat History</b>";

  if(chats.length === 0){
    history.innerHTML += `<div class="history-item">No chats yet</div>`;
    return;
  }

  chats.forEach(chat => {
    const item = document.createElement("div");
    item.className = "history-item";
    item.innerText = chat.title;
    item.onclick = () => openChat(chat);
    history.appendChild(item);
  });
}

function openChat(chat){
  document.getElementById("chat").innerHTML = "";
  addMessage(chat.question, "user");
  addMessage(chat.answer, "bot");

  if(window.innerWidth <= 768){
    toggleSidebar();
  }
}

function newChat(){
  currentChatId = Date.now().toString();

  document.getElementById("chat").innerHTML = `
    <div class="welcome" id="welcome">
      <h1>How can I help you today?</h1>
      <p>Ask anything about KREHSST resources, hiring, HR, or support.</p>

      <div class="suggestions" id="suggestions"></div>

      <div class="welcome-input">
        <textarea id="welcomeQ" placeholder="Or type your own question..."></textarea>
        <button class="mic" onclick="startMic('welcomeQ')">🎤</button>
        <button onclick="askFromWelcome()">Send</button>
      </div>
    </div>
  `;

  showSuggestions();

  if(window.innerWidth <= 768){
    toggleSidebar();
  }
}

function handleKey(event){
  if(event.key === "Enter" && !event.shiftKey){
    event.preventDefault();
    ask();
  }
}

function startMic(targetId = "q"){
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Mic voice input is not supported in this browser.");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.start();

  recognition.onresult = function(event){
    document.getElementById(targetId).value =
      event.results[0][0].transcript;
  };
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.innerText = text;
  return div.innerHTML;
}
</script>

</body>
</html>
