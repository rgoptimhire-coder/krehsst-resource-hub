<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KREHSST Assistant</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, -apple-system, Segoe UI, Roboto, sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #f9fafb;
  overflow: hidden;
  color: #1f2937;
}

/* Sidebar Styling & Desktop Toggle Capabilities */
.sidebar {
  width: 260px;
  background: #111827;
  color: white;
  display: flex;
  flex-direction: column;
  padding: 20px 15px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
  z-index: 100;
}

.sidebar.closed {
  margin-left: -260px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 25px;
}

.sidebar-title {
  font-size: 18px;
  font-weight: 600;
  color: #f3f4f6;
}

.sidebar-toggle-btn {
  background: transparent;
  border: none;
  color: #9ca3af;
  font-size: 20px;
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 6px;
  transition: background 0.2s;
}

.sidebar-toggle-btn:hover {
  background: #1f2937;
  color: white;
}

.new-chat {
  background: #1f2937;
  border: 1px solid #374151;
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 500;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.new-chat:hover {
  background: #374151;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  position: relative;
}

/* Updated Header to host Logo next to Assistant Title */
.header {
  height: 60px;
  background: white;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-weight: 600;
  font-size: 16px;
  gap: 12px;
}

.logo-img {
  max-height: 28px;
  width: auto;
  object-fit: contain;
  display: block;
}

.menu {
  cursor: pointer;
  font-size: 20px;
  color: #4b5563;
  padding: 6px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.menu:hover {
  background: #f3f4f6;
}

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 40px 20px;
  scroll-behavior: smooth;
}

.welcome {
  text-align: center;
  margin: 12vh auto 0;
  max-width: 600px;
}

.welcome h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
  color: #111827;
}

.welcome p {
  color: #4b5563;
  font-size: 16px;
}

.message-wrapper {
  max-width: 800px;
  margin: 0 auto 28px;
  display: flex;
  gap: 16px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.user-avatar {
  background: #4f46e5;
  color: white;
}

.bot-avatar {
  background: #10b981;
  color: white;
}

.bubble {
  flex: 1;
  background: transparent;
  padding: 4px 0;
  line-height: 1.6;
  font-size: 15px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Loader Styling */
.loader-container {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #6b7280;
  font-size: 14px;
}

.sandbox-icon {
  width: 18px;
  height: 18px;
  border: 2px solid #d1d5db;
  border-top-color: #10b981;
  border-radius: 50%;
  animation: rotate 1s linear infinite;
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

.input-area {
  padding: 20px 20px 8px 20px;
  background: linear-gradient(transparent, white 20%);
}

.input-box {
  max-width: 800px;
  margin: auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: white;
  padding: 10px 14px;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
}

.input-box:focus-within {
  border-color: #10b981;
  box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.15);
}

textarea {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  resize: none;
  font-size: 15px;
  min-height: 24px;
  max-height: 200px;
  line-height: 1.5;
  padding: 4px 0;
}

.action-btn {
  background: transparent;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.mic-btn {
  color: #4b5563;
}

.mic-btn:hover {
  background: #f3f4f6;
  color: #111827;
}

.send-btn {
  background: #10b981;
  color: white;
}

.send-btn:hover {
  background: #059669;
}

/* 1-Line Page Bottom Disclaimer Styling */
.disclaimer {
  text-align: center;
  font-size: 12px;
  color: #9ca3af;
  padding-bottom: 8px;
  background: white;
}

.overlay {
  display: none;
}

/* Responsive Adaptive Viewports */
@media(max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -260px;
    top: 0;
    height: 100%;
    z-index: 1000;
  }
  .sidebar.open {
    left: 0;
    margin-left: 0;
  }
  .overlay.show {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 999;
  }
  .chat-container {
    padding: 20px 15px;
  }
  .welcome {
    margin-top: 15vh;
  }
  .welcome h1 {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Left Sidebar Area -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Menu</span>
    <button class="sidebar-toggle-btn" onclick="toggleSidebar()">✕</button>
  </div>
  <button class="new-chat" onclick="newChat()">
    <span>+</span> New Chat
  </button>
</div>

<!-- Right Chat Area Workspace -->
<div class="main">
  <div class="header">
    <div class="menu" onclick="toggleSidebar()">☰</div>
    <!-- Logo placed directly beside the text title -->
    <img src="/image_ea32dd.png" alt="Logo" class="logo-img">
    <span>KREHSST Assistant</span>
  </div>

  <div class="chat-container" id="chat">
    <div class="welcome" id="welcome">
      <h1>How can I help you?</h1>
      <p>Ask anything from your internal company resource documents.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="q" placeholder="write your doubt" rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="action-btn mic-btn" onclick="startMic()" title="Voice Input">🎤</button>
      <button class="action-btn send-btn" onclick="ask()" title="Send Message">➔</button>
    </div>
  </div>

  <!-- 1-line Bottom Disclaimer -->
  <div class="disclaimer">
    Disclaimer: AI generated answers can occasionally be inaccurate. Please cross-verify critical internal data.
  </div>
</div>

<script>
function toggleSidebar(){
  const isMobile = window.innerWidth <= 768;
  if(isMobile) {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
  } else {
    document.getElementById("sidebar").classList.toggle("closed");
  }
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.innerText = text || "";
  return div.innerHTML;
}

function autoGrow(element) {
  element.style.height = "24px";
  element.style.height = (element.scrollHeight - 4) + "px";
}

function addMessage(text, type, isLoader = false){
  const chat = document.getElementById("chat");
  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper";
  
  let innerContent = isLoader 
    ? `<div class="loader-container"><div class="sandbox-icon"></div><span>gathering results...</span></div>`
    : `<span>${escapeHtml(text)}</span>`;

  wrapper.innerHTML = `
    <div class="avatar ${type === "user" ? "user-avatar" : "bot-avatar"}">${type === "user" ? "U" : "AI"}</div>
    <div class="bubble">${innerContent}</div>
  `;
  
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
  return wrapper.querySelector(".bubble");
}

async function ask(){
  const input = document.getElementById("q");
  const message = input.value.trim();
  if(!message) return;

  const welcome = document.getElementById("welcome");
  if(welcome) welcome.style.display = "none";

  addMessage(message, "user");

  input.value = "";
  input.style.height = "24px"; 
  
  const botBubble = addMessage("", "bot", true);

  try{
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    botBubble.innerHTML = escapeHtml(data.answer || "No answer received.");

  } catch(error) {
    botBubble.innerHTML = "Unable to search knowledge base. Please check deployment/API setup.";
  }
}

function handleKey(event){
  if(event.key === "Enter" && !event.shiftKey){
    event.preventDefault();
    ask();
  }
}

function startMic(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert("Voice input not supported in this browser.");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.start();

  recognition.onresult = function(event){
    const textarea = document.getElementById("q");
    textarea.value = event.results[0][0].transcript;
    autoGrow(textarea);
  };
}

function newChat(){
  document.getElementById("chat").innerHTML = `
    <div class="welcome" id="welcome">
      <h1>How can I help you?</h1>
      <p>Ask anything from your internal company resource documents.</p>
    </div>
  `;
  if(window.innerWidth <= 768){
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
  }
}
</script>

</body>
</html>
