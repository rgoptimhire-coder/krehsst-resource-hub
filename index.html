<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KREHSST Resource Hub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #1a1f36;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    header .avatar {
      width: 38px;
      height: 38px;
      background: #4f6ef7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header .info h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    header .info p {
      font-size: 12px;
      color: #9ca8d0;
      margin-top: 2px;
    }

    header .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4ade80;
    }

    header .status::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 5px;
    }
    #chat::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    /* ── Messages ── */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .message-row.user {
      flex-direction: row-reverse;
    }

    .message-row .icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message-row.bot .icon {
      background: #1a1f36;
    }

    .message-row.user .icon {
      background: #4f6ef7;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      /* ── Critical: ensures long answers render fully ── */
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .message-row.bot .bubble {
      background: #ffffff;
      color: #1e293b;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message-row.user .bubble {
      background: #4f6ef7;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: #fff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    #input-area {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.2s;
      overflow-y: auto;
    }

    #userInput:focus {
      border-color: #4f6ef7;
    }

    #userInput::placeholder {
      color: #94a3b8;
    }

    #sendBtn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #4f6ef7;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #sendBtn:hover { background: #3b56d9; }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { background: #c7d2fe; cursor: not-allowed; }

    #sendBtn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* ── Welcome chips ── */
    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .chip:hover { background: #dbeafe; }
  </style>
</head>
<body>

<header>
  <div class="avatar">🤝</div>
  <div class="info">
    <h1>KREHSST Resource Hub</h1>
    <p>HR Copilot · Internal Knowledge Assistant</p>
  </div>
  <div class="status">Online</div>
</header>

<div id="chat"></div>

<div id="input-area">
  <textarea
    id="userInput"
    placeholder="Ask about policies, job descriptions, interview questions..."
    rows="1"
  ></textarea>
  <button id="sendBtn" onclick="ask()" title="Send">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  // ── Auto-grow textarea ──
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  // ── Enter to send (Shift+Enter = new line) ──
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      ask();
    }
  });

  // ── Welcome message on load ──
  window.addEventListener("load", () => {
    const welcomeText =
      "Hello! 👋 I am your KREHSST Resource Hub Assistant.\n\n" +
      "I can help you with:\n" +
      "- Company policies and SOPs\n" +
      "- Job descriptions and templates\n" +
      "- Interview and screening questions\n" +
      "- HR guidelines and compliance\n\n" +
      "What would you like to know?";

    const row = createBotRow(welcomeText);

    // Append quick-action chips
    const chips = document.createElement("div");
    chips.className = "welcome-chips";
    [
      "CFO Screening Questions",
      "Leave Policy",
      "Onboarding SOP",
      "Performance Review Template",
    ].forEach((label) => {
      const chip = document.createElement("button");
      chip.className = "chip";
      chip.textContent = label;
      chip.onclick = () => {
        input.value = label;
        ask();
      };
      chips.appendChild(chip);
    });

    row.querySelector(".bubble").appendChild(chips);
    chat.appendChild(row);
    scrollToBottom();
  });

  // ── Create a bot message row ──
  function createBotRow(text) {
    const row = document.createElement("div");
    row.className = "message-row bot";

    const icon = document.createElement("div");
    icon.className = "icon";
    icon.textContent = "🤝";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    // Use textContent for safe, full rendering — no truncation risk
    bubble.textContent = text;

    row.appendChild(icon);
    row.appendChild(bubble);
    return row;
  }

  // ── Create a user message row ──
  function createUserRow(text) {
    const row = document.createElement("div");
    row.className = "message-row user";

    const icon = document.createElement("div");
    icon.className = "icon";
    icon.textContent = "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(icon);
    row.appendChild(bubble);
    return row;
  }

  // ── Typing indicator ──
  function addTypingIndicator() {
    const row = document.createElement("div");
    row.className = "message-row bot";
    row.id = "typing-row";

    const icon = document.createElement("div");
    icon.className = "icon";
    icon.textContent = "🤝";

    const indicator = document.createElement("div");
    indicator.className = "typing-indicator";
    indicator.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(icon);
    row.appendChild(indicator);
    chat.appendChild(row);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typing-row");
    if (el) el.remove();
  }

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Main ask function ──
  async function ask() {
    const message = input.value.trim();
    if (!message) return;

    // Clear + disable input
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;

    // Show user bubble
    chat.appendChild(createUserRow(message));
    scrollToBottom();

    // Show typing
    addTypingIndicator();

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      const data = await response.json();
      removeTypingIndicator();

      const resultText = data.answer || "No answer received.";

      // ── Display full response immediately (no streaming) ──
      const botRow = createBotRow(resultText);
      chat.appendChild(botRow);
      scrollToBottom();
    } catch (err) {
      removeTypingIndicator();
      const errorRow = createBotRow(
        "Something went wrong connecting to the server. Please try again in a moment."
      );
      chat.appendChild(errorRow);
      scrollToBottom();
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
