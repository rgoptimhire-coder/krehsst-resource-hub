```html
<!DOCTYPE html>
<html lang="en">
<head>

<title>KREHSST Assistant</title>

<style>
*{
margin:0;

box-sizing:border-box;
font-family:Inter,Segoe UI,sans-serif;
}

body{

<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
<div class="logo">KREHSST Assistant</div>

<button class="new-chat" onclick="newChat()">
+ New Chat
</button>

<div class="history" id="history"></div>
</div>

<div class="main">

<div class="header">
<div class="menu" onclick="toggleSidebar()">☰</div>
KREHSST Knowledge Assistant
</div>

<div class="chat-container" id="chat">

<div class="welcome" id="welcome">
<h1>How can I help you?</h1>
<p>Search your Notion knowledge base.</p>
</div>

</div>

<div class="input-area">
<div class="input-box">

<textarea
id="q"
placeholder="Ask anything..."
onkeydown="handleKey(event)"
></textarea>

<button
class="mic-btn"
onclick="startMic()"
>
🎤
</button>

<button
class="send-btn"
onclick="ask()"
>
Send
</button>

</div>
</div>

</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
}

function escapeHtml(text){
const div=document.createElement("div");
div.innerText=text;
return div.innerHTML;
}

function addMessage(text,type){

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className="message";

div.innerHTML=`
<div class="avatar ${type==="user"?"user":"bot"}">
${type==="user"?"U":"AI"}
</div>

<div class="bubble">
${escapeHtml(text)}
</div>
`;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;
}

async function ask(){

const input=document.getElementById("q");

const message=input.value.trim();

if(!message) return;

const welcome=document.getElementById("welcome");

if(welcome){
welcome.style.display="none";
}

addMessage(message,"user");

saveHistory(message);

input.value="";

addMessage("Searching knowledge base...","bot");

const bubbles=document.querySelectorAll(".bubble");

const lastBubble=bubbles[bubbles.length-1];

try{

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message
})
});

const data=await res.json();

lastBubble.innerText=data.answer;

}catch(error){

lastBubble.innerText=
"Unable to search knowledge base.";

}

}

function handleKey(event){

if(event.key==="Enter" && !event.shiftKey){

event.preventDefault();

ask();

}

}

function startMic(){

const SpeechRecognition=
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice input not supported.");

return;

}

const recognition=
new SpeechRecognition();

recognition.lang="en-IN";

recognition.start();

recognition.onresult=function(event){

document.getElementById("q").value=
event.results[0][0].transcript;

};

}

function saveHistory(question){

let chats=
JSON.parse(
localStorage.getItem("krehsst_history")
|| "[]"
);

chats.unshift(question);

chats=chats.slice(0,20);

localStorage.setItem(
"krehsst_history",
JSON.stringify(chats)
);

loadHistory();

}

function loadHistory(){

const history=
document.getElementById("history");

let chats=
JSON.parse(
localStorage.getItem("krehsst_history")
|| "[]"
);

history.innerHTML="";

chats.forEach(chat=>{

const div=
document.createElement("div");

div.className="history-item";

div.innerText=chat;

div.onclick=()=>{

document.getElementById("q").value=chat;

};

history.appendChild(div);

});

}

function newChat(){

document.getElementById("chat").innerHTML=`
<div class="welcome" id="welcome">
<h1>How can I help you?</h1>
<p>Search your Notion knowledge base.</p>
</div>
`;

}

loadHistory();

</script>

</body>
</html>
